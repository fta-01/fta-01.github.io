<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5x5 策略对战棋 - P2P版</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --board-color: #dcb35c;
            --grid-color: #333;
            --player1-color: #e74c3c;
            --player2-color: #3498db;
            --highlight-color: rgba(46, 204, 113, 0.6);
            --selected-color: rgba(241, 196, 15, 0.6);
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .status-panel {
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: bold;
        }

        .turn-indicator {
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            transition: all 0.3s;
            margin-bottom: 5px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .turn-player1 { background-color: var(--player1-color); }
        .turn-player2 { background-color: var(--player2-color); }
        .turn-waiting { background-color: #95a5a6; }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            background-color: var(--grid-color);
            border: 4px solid var(--grid-color);
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            margin: 0 auto;
        }

        .cell {
            background-color: var(--board-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .cell::after, .cell::before {
            content: '';
            position: absolute;
            background-color: var(--grid-color);
            z-index: 1;
            opacity: 0.3;
        }
        .cell::after { width: 1px; height: 100%; }
        .cell::before { width: 100%; height: 1px; }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.2s;
            position: relative;
        }

        .piece.player1 { background-color: var(--player1-color); }
        .piece.player2 { background-color: var(--player2-color); }
        .piece.selected {
            transform: scale(1.1);
            box-shadow: 0 0 10px var(--selected-color);
            border: 2px solid white;
        }

        .valid-move {
            position: absolute;
            width: 25%;
            height: 25%;
            background-color: var(--highlight-color);
            border-radius: 50%;
            z-index: 3;
        }

        .lobby-overlay, .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .panel {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            color: #333;
            width: 85%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 15px;
            font-size: 0.85rem;
            cursor: pointer;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            margin: 3px;
        }
        button:hover { background-color: #2c3e50; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .game-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .board-side {
            flex: 1;
            min-width: 300px;
        }

        .chat-container {
            width: 90vw;
            max-width: 320px;
            height: 250px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            .chat-container {
                width: 250px;
                height: 450px;
                margin-top: 0;
            }
            .status-panel {\ font-size: 1.2rem; }
            .turn-indicator {\ font-size: 1rem; }
        }

        .chat-header {
            padding: 8px;
            background: #34495e;
            color: white;
            border-radius: 8px 8px 0 0;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            font-size: 0.8rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .message {
            max-width: 85%;
            padding: 5px 8px;
            border-radius: 6px;
            word-wrap: break-word;
        }

        .message.my-message {
            align-self: flex-end;
            background-color: #dcf8c6;
            color: #333;
        }

        .message.opponent-message {
            align-self: flex-start;
            background-color: #ebebeb;
            color: #333;
        }

        .chat-input-area {
            padding: 8px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 5px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.8rem;
            width: auto;
            margin: 0;
        }

        .chat-input-area button {
            padding: 5px 10px;
            margin: 0;
            font-size: 0.75rem;
        }

        .log {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #666;
            max-height: 50px;
            overflow-y: auto;
            width: 100%;
            border-top: 1px solid #ccc;
            padding-top: 5px;
            text-align: left;
        }

        .audio-controls {
            position: fixed;
            top: 5px;
            right: 5px;
            display: flex;
            gap: 5px;
            z-index: 50;
        }

        .audio-controls button {
            padding: 5px 10px;
            font-size: 0.7rem;
        }

        .confirm-dialog { display: none; }
    </style>
</head>
<body>

<!-- 音效 (使用 Base64 确保在受限环境下也能工作) -->
<audio id="bgm" loop>
    <source src="background.mp3" type="audio/mpeg">
</audio>
<audio id="move-sound">
    <!-- 一个非常短的落子音效 Base64 -->
    <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YT9vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT18=" type="audio/wav">
</audio>

<div class="audio-controls">
    <button onclick="toggleBGM()" id="bgm-btn">🎵 开启音乐</button>
</div>

<div id="lobby" class="lobby-overlay">
    <div class="panel">
        <h2>5x5 策略对战 (P2P)</h2>
        <div id="peer-id-section">
            <p>您的 ID (点击复制):</p>
            <strong id="my-peer-id" style="cursor:pointer; color: #3498db; font-size: 1.2rem;">正在获取...</strong>
            <div id="signaling-status" style="font-size: 0.7rem; color: #7f8c8d; margin-top: 2px;">信号服务器: 正在连接...</div>
            <div style="margin-top: 10px;">
                <button onclick="copyInviteLink()" style="background-color: #27ae60;">复制邀请链接</button>
            </div>
            <p style="font-size: 0.75rem; color: #7f8c8d; margin-top: 5px;">(发送链接给好友，点击即可连线)</p>
        </div>
        <hr style="margin: 15px 0;">
        <div id="join-panel">
            <p>或者：输入对手的 ID 并连接</p>
            <input type="text" id="opponentIdInput" placeholder="对手 ID" maxlength="50">
            <br>
            <button id="connect-btn" onclick="connectToPeer()">连接对手</button>
        </div>
        <div id="waiting-panel" style="display:none;">
            <p>已连接! 游戏即将开始...</p>
            <div style="margin-top: 20px;">
                <span class="turn-indicator turn-waiting">准备中...</span>
            </div>
        </div>
    </div>
</div>

<!-- 确认弹窗 -->
<div id="confirm-modal" class="modal-overlay confirm-dialog">
    <div class="panel">
        <h3 id="confirm-title">请求</h3>
        <p id="confirm-msg">对方请求...</p>
        <button onclick="respond(true)">同意</button>
        <button onclick="respond(false)">拒绝</button>
    </div>
</div>

<!-- 游戏结束弹窗 -->
<div id="result-modal" class="modal-overlay confirm-dialog">
    <div class="panel">
        <h2 id="result-title">游戏结束</h2>
        <p id="result-msg"></p>
        <button onclick="requestReset()">请求下一局</button>
        <button onclick="location.reload()">退出房间</button>
    </div>
</div>

<!-- 等待对方响应弹窗 -->
<div id="waiting-modal" class="modal-overlay confirm-dialog">
    <div class="panel">
        <h3 id="waiting-title">请稍候</h3>
        <p id="waiting-msg">正在等待对方响应请求...</p>
        <div style="margin-top: 20px;">
            <span class="turn-indicator turn-waiting">等待中...</span>
        </div>
    </div>
</div>

<div class="game-container">
    <div class="status-panel">
        <div id="turn-box" class="turn-indicator turn-waiting">等待中...</div>
        <div id="role-info" style="font-size:0.9rem; color:#666;">尚未加入</div>
    </div>

    <div class="game-wrapper">
        <div class="board-side">
            <div id="board" class="board"></div>
            <div class="controls" style="margin-top:15px;">
                <button id="undo-btn" onclick="requestUndo()" disabled title="只有对方刚刚走完棋，且还没到你走时才能悔棋（取回你刚才的步子）">请求悔棋</button>
                <button id="surrender-btn" onclick="surrender()" style="display:none; background-color: #95a5a6;">认输</button>
                <button id="reset-btn" onclick="requestReset()" style="display:none">请求重开</button>
            </div>
            <div id="game-log" class="log"></div>
        </div>

        <div id="chat-box" class="chat-container" style="display:none;">
            <div class="chat-header">聊天室</div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="输入消息..." maxlength="50">
                <button onclick="sendChatMessage()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- P2P 通信配置 ---
    // 使用多个 STUN 服务器以提高穿透率
    const peerConfig = {
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun.cloudflare.com:3478' },
                { urls: 'stun:stun.anyfirewall.com:3478' },
                { urls: 'stun:stun.ekiga.net' },
                { urls: 'stun:stun.ideasip.com' },
                { urls: 'stun:stun.schlund.de' },
                { urls: 'stun:stun.voiparound.com' },
                { urls: 'stun:stun.voipbuster.com' },
                { urls: 'stun:stun.voipstunt.com' },
                { urls: 'stun:stun.voxgratia.org' }
            ],
            'sdpSemantics': 'unified-plan'
        },
        debug: 1 // 1: 仅错误, 2: 错误和警告, 3: 全部
    };

    let peer = new Peer(peerConfig);
    let conn = null;

    peer.on('open', (id) => {
        document.getElementById('my-peer-id').textContent = id;
        document.getElementById('signaling-status').textContent = '信号服务器: 已连接';
        document.getElementById('signaling-status').style.color = '#27ae60';
        log(`您的 P2P ID 已就绪: ${id}`);
        
        // 检查 URL 是否有对手 ID，如果有则尝试自动连接
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('peer');
        if (targetId && targetId !== id) {
            log(`检测到邀请，正在尝试自动连接到对手: ${targetId}...`);
            document.getElementById('opponentIdInput').value = targetId;
            connectToPeer();
        }

        // 环境检测
        if (!window.isSecureContext && location.protocol !== 'http:') {
            const warning = '⚠️ 当前环境不支持 P2P：请不要直接打开文件，请通过网址 (HTTPS) 访问。';
            log(warning);
            alert(warning);
        }
    });

    // 错误处理
    peer.on('error', (err) => {
        console.error('Peer 错误:', err.type, err);
        let msg = 'P2P 错误: ';
        if (err.type === 'browser-incompatible') msg += '您的浏览器不支持 P2P，请更换 Chrome/Edge/Firefox';
        else if (err.type === 'peer-unavailable') msg += '找不到该 ID 的对手，请检查 ID 是否正确';
        else if (err.type === 'network') msg += '网络连接失败，请检查是否联网';
        else if (err.type === 'ssl-unavailable') msg += '当前环境不支持 P2P（非 HTTPS），请通过网址访问';
        else if (err.type === 'disconnected') msg += '连接已断开，请刷新页面重试';
        else msg += err.type + ': ' + err.message;
        
        log(msg);
        alert(msg);
    });

    peer.on('disconnected', () => {
        document.getElementById('signaling-status').textContent = '信号服务器: 已断开';
        document.getElementById('signaling-status').style.color = '#e74c3c';
        log('与信号服务器的连接已断开，正在尝试重新连接...');
        peer.reconnect();
    });

    peer.on('close', () => {
        document.getElementById('signaling-status').textContent = '信号服务器: 已关闭';
        document.getElementById('signaling-status').style.color = '#e74c3c';
        log('Peer 连接已彻底关闭。');
    });

    // 点击复制 ID (兼容非安全环境)
    document.getElementById('my-peer-id').addEventListener('click', () => {
        const id = document.getElementById('my-peer-id').textContent;
        if (id === '正在获取...') return;
        
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(id).then(() => alert('ID 已复制到剪贴板！'));
        } else {
            // 兼容非安全环境的复制
            const textArea = document.createElement("textarea");
            textArea.value = id;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert('ID 已复制（传统模式）！');
            } catch (err) {
                alert('复制失败，请手动选择 ID 复制。');
            }
            document.body.removeChild(textArea);
        }
    });

    // 复制邀请链接
    function copyInviteLink() {
        const id = document.getElementById('my-peer-id').textContent;
        if (id === '正在获取...') return;
        
        const url = new URL(window.location.href);
        url.searchParams.set('peer', id);
        const inviteUrl = url.toString();

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(inviteUrl).then(() => alert('邀请链接已复制！发送给好友即可开始对战。'));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = inviteUrl;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert('邀请链接已复制（传统模式）！');
            } catch (err) {
                alert('复制失败，请手动选择 URL 复制。');
            }
            document.body.removeChild(textArea);
        }
    }

    // 监听连接请求 (作为接收方)
    peer.on('connection', (connection) => {
        if (conn) {
            connection.close();
            return;
        }
        conn = connection;
        myRole = 1; // 接收方为红方
        setupConnection();
    });

    // 作为发起方连接
    function connectToPeer() {
        if (peer.disconnected) {
            alert('连接已断开，正在尝试重新连接服务器...');
            peer.reconnect();
            return;
        }
        const targetId = document.getElementById('opponentIdInput').value.trim();
        if (!targetId) return alert('请输入对手 ID');
        
        // 增加日志
        log(`正在尝试连接到对手: ${targetId}...`);
        document.getElementById('connect-btn').disabled = true;
        document.getElementById('connect-btn').textContent = '连接中...';

        conn = peer.connect(targetId, {
            reliable: true
        });
        myRole = 2; // 发起方为蓝方
        setupConnection();

        // 设置连接超时
        setTimeout(() => {
            if (conn && !conn.open) {
                log('连接超时，请确认对手 ID 是否正确且在线。');
                document.getElementById('connect-btn').disabled = false;
                document.getElementById('connect-btn').textContent = '连接对手';
            }
        }, 10000);
    }

    function setupConnection() {
        conn.on('open', () => {
            log('已建立 P2P 连接！');
            document.getElementById('connect-btn').disabled = false;
            document.getElementById('connect-btn').textContent = '连接对手';
            // 如果我是发起方，告诉对方我是谁
            if (myRole === 2) {
                conn.send({ type: 'gameStart' });
                onGameStart();
            }
        });

        conn.on('data', (data) => {
            handleData(data);
        });

        conn.on('close', () => {
            log('连接已关闭。');
            alert('对手已断开连接');
            location.reload();
        });

        conn.on('error', (err) => {
            console.error('连接错误:', err);
            log(`连接出错: ${err.message}`);
            document.getElementById('connect-btn').disabled = false;
            document.getElementById('connect-btn').textContent = '连接对手';
        });
    }

    function handleData(data) {
        switch (data.type) {
            case 'gameStart':
                onGameStart();
                break;
            case 'opponentMove':
                lastState = JSON.stringify({ boardState, currentPlayer });
                executeMove(data.from.r, data.from.c, data.to.r, data.to.c, data.player, false);
                playMoveSound();
                break;
            case 'opponentElimination':
                const [r, c] = data.pos.split(',').map(Number);
                boardState[r][c] = 0;
                log(`对手淘汰了您的棋子于 (${r+1}, ${c+1})`);
                if (checkWin()) {
                    gameOver = true;
                    showResult();
                }
                renderBoard();
                break;
            case 'undoRequest':
                log('收到对手的悔棋请求');
                showConfirm('undo', '对方请求撤回最后一步，是否同意？');
                break;
            case 'undoResponse':
                elements.waitingModal.style.display = 'none';
                if (data.accept) {
                    log('对方同意了您的悔棋请求');
                    performUndo();
                } else {
                    log('对方拒绝了您的悔棋请求');
                    alert('对方拒绝了您的悔棋请求');
                }
                break;
            case 'resetRequest':
                log('收到对手的重开请求');
                elements.resultModal.style.display = 'none';
                showConfirm('reset', '对方请求重新开始游戏，是否同意？');
                break;
            case 'resetResponse':
                elements.waitingModal.style.display = 'none';
                if (data.accept) {
                    log('对方同意了重开请求');
                    resetGameLocally();
                } else {
                    log('对方拒绝了重开请求');
                    alert('对方拒绝了重开请求');
                }
                break;
            case 'opponentSurrender':
                gameOver = true;
                showResult(true);
                log('对方已认输，您获胜！');
                break;
            case 'chatMessage':
                appendMessage(data.player, data.message, false);
                break;
            case 'fullStateUpdate':
                boardState = data.boardState;
                currentPlayer = data.currentPlayer;
                renderBoard();
                updateUI();
                break;
        }
    }

    function onGameStart() {
        gameStarted = true;
        elements.role.textContent = `您是: ${myRole === 1 ? '红方 (下)' : '蓝方 (上)'}`;
        initBoard();
        elements.lobby.style.display = 'none';
        elements.resetBtn.style.display = 'inline-block';
        elements.surrenderBtn.style.display = 'inline-block';
        elements.chatBox.style.display = 'flex';
        updateUI();
        log('游戏开始！');
    }

    // --- 游戏逻辑 ---
    const BOARD_SIZE = 5;
    let boardState = [];
    let lastState = null;
    let currentPlayer = 1;
    let myRole = 0;
    let selectedPiece = null;
    let gameOver = false;
    let gameStarted = false;
    let currentRequest = null;

    const elements = {
        board: document.getElementById('board'),
        turnBox: document.getElementById('turn-box'),
        log: document.getElementById('game-log'),
        role: document.getElementById('role-info'),
        lobby: document.getElementById('lobby'),
        undoBtn: document.getElementById('undo-btn'),
        surrenderBtn: document.getElementById('surrender-btn'),
        resetBtn: document.getElementById('reset-btn'),
        confirmModal: document.getElementById('confirm-modal'),
        resultModal: document.getElementById('result-modal'),
        waitingModal: document.getElementById('waiting-modal'),
        moveSound: document.getElementById('move-sound'),
        bgm: document.getElementById('bgm'),
        chatBox: document.getElementById('chat-box'),
        chatMessages: document.getElementById('chat-messages'),
        chatInput: document.getElementById('chatInput')
    };

    // 音效
    function toggleBGM() {
        if (elements.bgm.paused) {
            elements.bgm.play().catch(e => console.error("BGM 播放失败", e));
            document.getElementById('bgm-btn').textContent = "🎵 停止音乐";
        } else {
            elements.bgm.pause();
            document.getElementById('bgm-btn').textContent = "🎵 开启音乐";
        }
    }

    function playMoveSound() {
        elements.moveSound.currentTime = 0;
        elements.moveSound.play().catch(e => {});
    }

    function showConfirm(type, msg) {
        currentRequest = type;
        document.getElementById('confirm-title').textContent = type === 'undo' ? '悔棋请求' : '重开请求';
        document.getElementById('confirm-msg').textContent = msg;
        elements.confirmModal.style.display = 'flex';
    }

    function respond(accept) {
        elements.confirmModal.style.display = 'none';
        if (currentRequest === 'undo') {
            conn.send({ type: 'undoResponse', accept });
            if (accept) performUndo();
        } else if (currentRequest === 'reset') {
            conn.send({ type: 'resetResponse', accept });
            if (accept) resetGameLocally();
        }
        currentRequest = null;
    }

    // 逻辑
    function initBoard() {
        boardState = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        for (let i = 0; i < BOARD_SIZE; i++) {
            boardState[0][i] = 2; boardState[4][i] = 1;
        }
        lastState = null;
        currentPlayer = 1;
        gameOver = false;
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        elements.board.innerHTML = '';
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (boardState[r][c] !== 0) {
                    const piece = document.createElement('div');
                    piece.className = `piece player${boardState[r][c]}`;
                    if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) piece.classList.add('selected');
                    cell.appendChild(piece);
                }
                if (selectedPiece && isValidMove(selectedPiece.r, selectedPiece.c, r, c)) {
                    const dot = document.createElement('div');
                    dot.className = 'valid-move';
                    cell.appendChild(dot);
                }
                cell.onclick = () => handleCellClick(r, c);
                elements.board.appendChild(cell);
            }
        }
    }

    function handleCellClick(r, c) {
        if (!gameStarted || gameOver || currentPlayer !== myRole) return;
        if (boardState[r][c] === myRole) {
            selectedPiece = (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) ? null : {r, c};
            renderBoard();
        } else if (selectedPiece && isValidMove(selectedPiece.r, selectedPiece.c, r, c)) {
            // 每次落子前保存当前状态为“上一个状态”
            lastState = JSON.stringify({ boardState, currentPlayer });
            executeMove(selectedPiece.r, selectedPiece.c, r, c, myRole, true);
            playMoveSound();
        }
    }

    function isValidMove(fr, fc, tr, tc) {
        if (boardState[tr][tc] !== 0) return false;
        return (Math.abs(fr - tr) === 1 && fc === tc) || (Math.abs(fc - tc) === 1 && fr === tr);
    }

    function executeMove(fr, fc, tr, tc, player, isLocal) {
        boardState[tr][tc] = player;
        boardState[fr][fc] = 0;
        if (isLocal) {
            selectedPiece = null;
            conn.send({ type: 'opponentMove', from: {r:fr, c:fc}, to: {r:tr, c:tc}, player });
            checkElimination(tr, tc, player);
        }
        log(`${player === 1 ? '红' : '蓝'}方 移动至 (${tr+1}, ${tc+1})`);
        if (checkWin()) {
            gameOver = true;
            showResult();
        } else {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }
        renderBoard();
    }

    function checkElimination(r, c, player) {
        const opponent = player === 1 ? 2 : 1;
        const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
        let killed = [];
        directions.forEach(([dr, dc]) => {
            if (isMatch(r+dr, c+dc, player) && isMatch(r+2*dr, c+2*dc, opponent) && !isMatch(r+3*dr, c+3*dc, opponent)) killed.push({r:r+2*dr, c:c+2*dc});
            if (isMatch(r-dr, c-dc, player) && isMatch(r-2*dr, c-2*dc, opponent) && !isMatch(r-3*dr, c-3*dc, opponent)) killed.push({r:r-2*dr, c:c-2*dc});
            if (isMatch(r-dr, c-dc, player) && isMatch(r+dr, c+dc, opponent) && !isMatch(r+2*dr, c+2*dc, opponent)) killed.push({r:r+dr, c:c+dc});
            if (isMatch(r+dr, c+dc, player) && isMatch(r-dr, c-dc, opponent) && !isMatch(r-2*dr, c-2*dc, opponent)) killed.push({r:r-dr, c:c-dc});
        });
        killed.forEach(p => {
            boardState[p.r][p.c] = 0;
            log(`您淘汰了对方棋子于 (${p.r+1}, ${p.c+1})`);
            conn.send({ type: 'opponentElimination', pos: `${p.r},${p.c}`, player });
        });
    }

    function isMatch(r, c, type) {
        return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && boardState[r][c] === type;
    }

    function checkWin() {
        let p1=0, p2=0;
        boardState.flat().forEach(v => { if(v===1)p1++; if(v===2)p2++; });
        return p1===0 || p2===0;
    }

    function performUndo() {
        if (lastState) {
            const last = JSON.parse(lastState);
            boardState = last.boardState;
            currentPlayer = last.currentPlayer;
            lastState = null; // 悔棋后立即清空，防止连续悔棋
            renderBoard();
            updateUI();
            log('已回退到上一个回合');
        }
    }

    function resetGameLocally() {
        initBoard();
        elements.resultModal.style.display = 'none';
        log('游戏已重开');
    }

    function requestUndo() { 
        if (conn) {
            log('正在向对方发起悔棋请求...');
            elements.waitingModal.style.display = 'flex'; // 显示等待弹窗
            conn.send({ type: 'undoRequest' }); 
        }
    }
    function requestReset() { 
        if (conn) {
            log('正在向对方发起重开请求...');
            elements.waitingModal.style.display = 'flex'; // 显示等待弹窗
            conn.send({ type: 'resetRequest' }); 
        }
    }

    function surrender() {
        if (!gameStarted || gameOver) return;
        if (confirm('确定要认输吗？')) {
            conn.send({ type: 'opponentSurrender' });
            gameOver = true;
            showResult(false); // 传入 false 表示我认输，即我输了
            log('您已认输。');
        }
    }

    function showResult(opponentSurrendered = null) {
        let winner;
        if (opponentSurrendered === true) {
            winner = myRole;
        } else if (opponentSurrendered === false) {
            winner = (myRole === 1 ? 2 : 1);
        } else {
            winner = boardState.flat().some(v => v===1) ? 1 : 2;
        }
        
        document.getElementById('result-title').textContent = winner === myRole ? "🎉 您赢了！" : "💀 您输了...";
        
        let msg = "";
        if (opponentSurrendered === true) msg = "对方已认输。";
        else if (opponentSurrendered === false) msg = "您已认输。";
        else msg = `${winner === 1 ? '红' : '蓝'}方获胜。`;
        
        document.getElementById('result-msg').textContent = `${msg}开启下一局？`;
        elements.resultModal.style.display = 'flex';
        elements.surrenderBtn.style.display = 'none'; // 游戏结束隐藏认输按钮
    }

    function updateUI() {
        if (!gameStarted) return;
        const isMyTurn = (currentPlayer === myRole);
        elements.turnBox.textContent = isMyTurn ? '您的回合' : '等待对手...';
        elements.turnBox.className = `turn-indicator turn-player${currentPlayer}`;
        
        // 悔棋逻辑：
        elements.undoBtn.disabled = isMyTurn || !lastState;
    }

    function log(msg) {
        const d = document.createElement('div');
        d.textContent = `> ${msg}`;
        elements.log.prepend(d);
    }

    // --- 聊天逻辑 ---
    function sendChatMessage() {
        const msg = elements.chatInput.value.trim();
        if (!msg || !gameStarted) return;

        appendMessage(myRole, msg, true);
        conn.send({ type: 'chatMessage', message: msg, player: myRole });
        elements.chatInput.value = '';
    }

    // 监听回车键发送
    elements.chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });

    function appendMessage(player, message, isMe) {
        const div = document.createElement('div');
        div.className = `message ${isMe ? 'my-message' : 'opponent-message'}`;
        div.textContent = message;
        elements.chatMessages.appendChild(div);
        elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
    }
</script>
</body>
</html>
